<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IELTS Language Lab - Master vocabulary and grammar with GPS framework">
    <meta name="theme-color" content="#3D5A80">

    <title>IELTS Language Lab</title>

    <!-- Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
    <!-- Root app container -->
    <div id="app" class="app-root">
        <!-- Splash/Loading Screen -->
        <div id="splash" class="splash-screen">
            <div class="splash-content">
                <div class="splash-logo">ð</div>
                <h1>IELTS Lab</h1>
                <div class="splash-loader">
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                </div>
                <p class="splash-text">Loading your learning journey...</p>
            </div>
        </div>

        <!-- Main content area (screens swap via router) -->
        <div id="screens-container" class="screens-container">
            <div class="screen" data-screen="login"></div>
            <div class="screen" data-screen="home"></div>
            <div class="screen" data-screen="levels"></div>
            <div class="screen" data-screen="exercise"></div>
            <div class="screen" data-screen="dashboard"></div>
            <div class="screen" data-screen="settings"></div>
        </div>

        <!-- Bottom Navigation Bar -->
        <nav class="nav-bar" role="navigation" aria-label="Main navigation">
            <button class="nav-item" id="nav-home" data-nav="home" aria-label="Home" title="Home">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="nav-label">Home</span>
            </button>

            <button class="nav-item" id="nav-levels" data-nav="levels" aria-label="Levels" title="Levels">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span class="nav-label">Levels</span>
            </button>

            <button class="nav-item" id="nav-practice" data-nav="exercise" aria-label="Practice" title="Practice">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span class="nav-label">Practice</span>
            </button>

            <button class="nav-item" id="nav-dashboard" data-nav="dashboard" aria-label="Dashboard" title="Dashboard">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="2" x2="12" y2="22"></line>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <span class="nav-label">Stats</span>
            </button>

            <button class="nav-item" id="nav-settings" data-nav="settings" aria-label="Settings" title="Settings">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m3.08-3.08l4.24-4.24"></path>
                </svg>
                <span class="nav-label">Settings</span>
            </button>
        </nav>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container" role="region" aria-live="polite" aria-atomic="true">
            <!-- Toasts will be injected here -->
        </div>

        <!-- Modal Container -->
        <div id="modal-container" class="modal-container" role="dialog" aria-hidden="true">
            <!-- Modals will be injected here -->
        </div>
    </div>

    <!-- Firebase SDK (compat for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- App Entry Point -->
    <script type="module" src="js/app.js?v=5"></script>
</body>
</html>
